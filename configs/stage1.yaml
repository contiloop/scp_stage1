model:
  name: "unsloth/Qwen3.5-4B-Base"
  max_seq_length: 2048
  dtype: "bfloat16"
  load_in_4bit: false

lora:
  r: 32
  lora_alpha: 32
  lora_dropout: 0.0
  target_modules: ["q_proj", "k_proj", "v_proj", "o_proj", "gate_proj", "up_proj", "down_proj", "in_proj_a", "in_proj_b", "in_proj_z", "in_proj_qkv", "out_proj"]
  bias: "none"
  task_type: "CAUSAL_LM"
  use_dora: false
  use_rslora: true

training:
  learning_rate: 1.0e-5
  lr_scheduler_type: "cosine"
  warmup_ratio: 0.1
  num_train_epochs: 1
  per_device_train_batch_size: 8
  gradient_accumulation_steps: 2    # effective batch = 16 × 2048 = 32K tokens
  bf16: true
  gradient_checkpointing: true
  weight_decay: 0.01
  max_grad_norm: 1.0
  logging_steps: 10
  save_steps: 250
  eval_strategy: "no"
  save_total_limit: 3
  seed: 42
  report_to: "wandb"
  output_dir: "checkpoints/stage1_cpt"
  dataloader_num_workers: 4

data:
  train_path: "data/processed/train"
  val_path: "data/processed/val"

upsampling:
  hk: 1
  mk: 1
  korea_bank: 10
  naver: 2
